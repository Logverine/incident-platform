spring:
  application:
    name: incident-service

  datasource:
    url: jdbc:postgresql://localhost:5432/incident_db
    username: postgres
    password: pass@123

  kafka:
    bootstrap-servers: localhost:29092

  flyway:
    enabled: true
    schemas: incident
    default-schema: incident

  jackson:
    time-zone: Asia/Kolkata

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate.default_schema: incident
      hibernate.jdbc.time_zone: UTC
    show-sql: true

server:
  port: 8081
