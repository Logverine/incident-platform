spring:
  application:
    name: alert-service

  datasource:
    url: jdbc:postgresql://host.docker.internal:5432/incident_db
    username: postgres
    password: pass@123

  flyway:
    enabled: true

  jackson:
    time-zone: Asia/Kolkata

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate.jdbc.time_zone: UTC
    show-sql: true