services:

  postgres:
    image: postgres:17
    container_name: incident-postgres

    environment:
      POSTGRES_DB: incident_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass@123

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

  alert-service:
    build:
      context: ../services/alert
      dockerfile: Dockerfile

    container_name: alert-service

    depends_on:
      - postgres

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/incident_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: pass@123

    ports:
      - "8080:8080"

volumes:
  postgres-data: